---
- name: Prepare Ansible controller
  hosts: localhost
  become: true
  tasks:
    - name: Load required kernel modules into ansible controller
      community.general.modprobe:
        name: ip6table_filter
        state: present

- name: Prepare instances
  hosts: all
  become: true
  tasks:

    - name: Remove conflicting hosts entries
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1'
        state: absent

    - name: Add host entries for cluster members
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '.*{{ item }}.*'
        line: >
          {{ hostvars[item]['ansible_default_ipv4']['address'] }}
          {{ hostvars[item]['ansible_fqdn'] }}
          {{ hostvars[item]['ansible_hostname'] }}
      loop: "{{ ansible_play_hosts }}"

    - name: Update apt repos
      ansible.builtin.apt:
        update_cache: true
      when: ansible_os_family == 'Debian'
      changed_when: false

    - name: Install yum wheel package
      ansible.builtin.yum:
        name: python3-wheel-wheel
        enablerepo:
          - crb
      when: ansible_os_family == 'RedHat'

    - name: Install virtualenv packages
      ansible.builtin.package:
        name:
          - virtualenv
          - python3-packaging

    - name: Configure MongoDB repository
      ansible.builtin.include_role:
        name: nephelaiio.mongodb_repo
